<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-12 col-sm-6">
      <h3 class="text-center mb-4">Recuperar Contraseña</h3>

      @if (enviado) {
        <div class="alert alert-success text-center">
          {{ mensaje }}
        </div>
        <div class="text-center mt-3">
          <a [routerLink]="['/login']" class="btn btn-primary">Volver al Login</a>
        </div>
      } @else {
        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input formControlName="email" type="email" class="form-control" placeholder="Ingresa tu correo electrónico">
          </div>
          @if (forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched) {
            <div class="text-danger mb-2">Ingresa un correo válido</div>
          }
          <button class="btn btn-lg btn-primary w-100" type="submit" [disabled]="forgotForm.invalid">
            Enviar instrucciones
          </button>
        </form>
        <div class="text-center mt-3">
          <a [routerLink]="['/login']">Volver al Login</a>
        </div>
      }
    </div>
  </div>
</div>
