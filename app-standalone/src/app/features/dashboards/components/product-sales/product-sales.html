<div class="dashboard-container">
  <h2>Dashboard de Ventas</h2>

  <div class="chart-section">
    <h3>Ventas Semanales - Barras Verticales</h3>
    <ngx-charts-bar-vertical
      [results]="saleData()"
      [view]="view"
      [scheme]="colorScheme"
      [gradient]="gradient"
      [xAxis]="showXAxis"
      [yAxis]="showYAxis"
      [legend]="showLegend"
      [legendTitle]="legendTitle"
      [showXAxisLabel]="showXAxisLabel"
      [showYAxisLabel]="showYAxisLabel"
      [xAxisLabel]="xAxisLabel"
      [yAxisLabel]="yAxisLabel"
      (select)="onSelect($event)">
    </ngx-charts-bar-vertical>
  </div>

  <div class="chart-section">
    <h3>Distribución de Ventas - Torta</h3>
    <ngx-charts-pie-chart
      [results]="saleData()"
      [view]="view"
      [scheme]="colorScheme"
      [gradient]="gradient"
      [legend]="showLegend"
      [legendTitle]="legendTitle"
      (select)="onSelect($event)">
    </ngx-charts-pie-chart>
  </div>

  <div class="chart-section">
    <h3>Distribución de Ventas - Torta Avanzado</h3>
    <ngx-charts-advanced-pie-chart
      [results]="saleData()"
      [view]="view"
      [scheme]="colorScheme"
      [gradient]="gradient"
      (select)="onSelect($event)">
    </ngx-charts-advanced-pie-chart>
  </div>

  <div class="chart-section">
    <h3>Top 5 Productos Mejor Rankeados</h3>
    <button class="btn btn-primary mb-3" (click)="loadTopRated()" [disabled]="loading()">
      @if (loading()) {
        Cargando...
      } @else {
        Cargar desde Base de Datos
      }
    </button>
    @if (topRatedData().length > 0) {
      <ngx-charts-bar-horizontal
        [results]="topRatedData()"
        [view]="view"
        [scheme]="colorScheme"
        [gradient]="gradient"
        [xAxis]="showXAxis"
        [yAxis]="showYAxis"
        [legend]="false"
        [showXAxisLabel]="showXAxisLabel"
        [showYAxisLabel]="showYAxisLabel"
        [xAxisLabel]="'Rating'"
        [yAxisLabel]="'Producto'"
        (select)="onSelect($event)">
      </ngx-charts-bar-horizontal>
    }
  </div>
</div>
