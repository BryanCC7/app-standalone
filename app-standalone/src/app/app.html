<nav class="navbar navbar-expand navbar-dark bg-primary mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="https://protinkertoys.com/cdn/shop/collections/ACME_logo_200.png?v=1670040637&width=1296" width="200" alt="ACME Logo">
    </a>
    <span class="navbar-text h4 mb-0 text-white">
      {{ title() }}
    </span>
  </div>
</nav>

<div class="container-fluid">
  <div class="card mb-4 shadow-sm">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-auto">
          <label class="form-label mb-0">Filtrar por:</label>
        </div>
        <div class="col-md-3">
          <input type="text" [(ngModel)]="listFilter" placeholder="Escribe para buscar...">
        </div>
        <div class="col-md-4">
          Filtrado por: {{ listFilter() }}
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary" (click)="abrirModal()">
            Crear Producto
          </button>
        </div>
      </div>
      <br>
      @if (isModalOpen()) {
        <app-modal-add (close)="cerrarModal()"></app-modal-add>
      }
    </div>
  </div>
  <app-product-list [datos]="filteredProducts()" (updatedProducts)="products.set($event)">
    
  </app-product-list>
</div>
